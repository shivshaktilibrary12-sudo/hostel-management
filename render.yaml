services:
  - type: web
    name: hostel-management
    env: node
    region: singapore
    plan: free
    buildCommand: npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CI
        value: false
      - key: PORT
        value: 10000